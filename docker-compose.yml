services:

  valkey:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://valkey:6379
    depends_on:
      valkey:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

  worker:
    build: .
    command: uv run rq worker emails --url redis://valkey:6379
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://valkey:6379
    depends_on:
      valkey:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  valkey-data:
